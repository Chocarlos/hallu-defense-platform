name: lock-refresh

on:
  pull_request:
  push:
    branches: ["codex/public-stabilization-v0.1.0"]

permissions:
  contents: read

jobs:
  generate-node-lock:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Verify exact npm
        run: test "$(npm --version)" = "11.16.0"
      - name: Regenerate lock without lifecycle scripts
        run: npm install --package-lock-only --ignore-scripts
      - name: Verify patched runtime audit
        run: npm audit --omit=dev --audit-level=high
      - name: Upload generated lock
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: generated-node-lock-${{ github.sha }}
          path: package-lock.json
          if-no-files-found: error
          include-hidden-files: false
          compression-level: 6
          overwrite: false
          retention-days: 1
