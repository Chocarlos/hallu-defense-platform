name: lock-refresh

on:
  push:
    branches: ["codex/public-stabilization-v0.1.0"]
    paths:
      - "package.json"
      - ".github/workflows/lock-refresh.yml"

permissions:
  contents: write

jobs:
  generate-node-lock:
    if: >-
      github.repository == 'Chocarlos/hallu-defense-platform' &&
      github.ref == 'refs/heads/codex/public-stabilization-v0.1.0'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: codex/public-stabilization-v0.1.0
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Verify exact npm
        run: test "$(npm --version)" = "11.16.0"
      - name: Regenerate lock under the repository script policy
        run: npm install --package-lock-only
      - name: Advance exact governed PostCSS assertions
        run: |
          python - <<'PY'
          from pathlib import Path

          expected = {
              Path("scripts/ci/check_foundation_infra.py"): 3,
              Path("scripts/ci/check_python_reproducibility.py"): 4,
              Path("apps/console/lib/dependency-policy.test.ts"): 2,
          }
          for path, expected_count in expected.items():
              text = path.read_text(encoding="utf-8")
              observed = text.count("8.5.10")
              if observed != expected_count:
                  raise SystemExit(
                      f"{path}: expected {expected_count} reviewed 8.5.10 markers, found {observed}"
                  )
              path.write_text(text.replace("8.5.10", "8.5.12"), encoding="utf-8")
          PY
      - name: Verify patched runtime audit
        run: npm audit --omit=dev --audit-level=high
      - name: Commit exact generated subjects
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git diff --check
          paths=(
            package-lock.json
            scripts/ci/check_foundation_infra.py
            scripts/ci/check_python_reproducibility.py
            apps/console/lib/dependency-policy.test.ts
          )
          if git diff --quiet -- "${paths[@]}"; then
            echo "Generated lock and governed assertions are already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${paths[@]}"
          git commit -m "fix(security): resolve patched PostCSS lock"
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${GITHUB_REF_NAME}"
