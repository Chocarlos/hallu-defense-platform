name: evals

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  evals-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e "apps/api[dev]"
      - run: python scripts/ci/check_eval_thresholds_config.py
      - run: python scripts/ci/check_verifier_calibration.py
      - run: python evals/runners/smoke.py
      - run: python evals/runners/scenarios.py
