name: evals

on:
  pull_request:
  push:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  evals-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - run: python scripts/ci/install_python_lock.py build-tools
      - run: python scripts/ci/install_python_lock.py dev
      - run: python scripts/ci/check_eval_thresholds_config.py
      - run: python scripts/ci/check_verifier_calibration.py
      - run: python evals/runners/smoke.py
      - run: python evals/runners/scenarios.py
