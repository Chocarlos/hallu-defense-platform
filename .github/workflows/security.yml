name: security

on:
  pull_request:
  push:
    branches: ["master", "main"]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
  PYTHONPATH: ${{ github.workspace }}/apps/api/src

jobs:
  security-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - run: python scripts/ci/install_python_lock.py build-tools
      - run: python scripts/ci/compile_python_locks.py --check
      - run: python scripts/ci/install_python_lock.py dev
      - run: test "$(npm --version)" = "11.16.0"
      - run: npm ci
      - run: python scripts/ci/check_python_reproducibility.py
      - name: Install pinned Helm for security chart gates
        env:
          HELM_VERSION: v4.2.2
          HELM_SHA256: 9adafecab4d406853bba163a70e9f104f47dbbf65ce24b7653bae7e36150bcb6
        run: |
          archive="$RUNNER_TEMP/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          extract_dir="$RUNNER_TEMP/helm-${HELM_VERSION}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          printf '%s  %s\n' "${HELM_SHA256}" "$archive" | sha256sum --check
          mkdir -p "$extract_dir"
          tar -xzf "$archive" -C "$extract_dir"
          sudo install "$extract_dir/linux-amd64/helm" /usr/local/bin/helm
          test "$(helm version --short)" = "v4.2.2+gb05881c"
      - name: Install pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          printf '%s  %s\n' "$GITLEAKS_LINUX_X64_SHA256" "$archive" | sha256sum --check
          mkdir -p "$RUNNER_TEMP/gitleaks-bin"
          tar -xzf "$archive" -C "$RUNNER_TEMP/gitleaks-bin" gitleaks
          chmod 0755 "$RUNNER_TEMP/gitleaks-bin/gitleaks"
          echo "GITLEAKS_BINARY=$RUNNER_TEMP/gitleaks-bin/gitleaks" >> "$GITHUB_ENV"
          test "$("$RUNNER_TEMP/gitleaks-bin/gitleaks" version)" = "${GITLEAKS_VERSION}"
      - run: python scripts/ci/check_gitleaks_config.py
      - run: python scripts/ci/run_gitleaks.py
      - name: Exercise real Gitleaks fixtures
        run: python -m pytest -q apps/api/tests/test_gitleaks_gate.py --suite-lane=live
      - run: python scripts/ci/secret_scan.py
      - run: python scripts/ci/check_encryption_config.py
      - run: python scripts/ci/check_release_security_config.py
      - run: python scripts/ci/check_release_encryption_workflow.py
      - run: python scripts/ci/check_auth_config.py
      - run: python scripts/ci/oidc_provider_smoke.py
      - run: python scripts/ci/check_secrets_config.py
      - run: python scripts/ci/check_audit_ledger_config.py
      - run: python scripts/ci/check_approval_queue_config.py
      - run: python scripts/ci/check_corpus_grants_config.py
      - run: python scripts/ci/check_backup_retention_config.py
      - run: python scripts/ci/check_minio_backup_drill.py
      - run: python scripts/ci/check_rag_persistence_config.py
      - run: python scripts/ci/check_postgres_migrations.py
      - run: python scripts/dev/bootstrap_opensearch_template.py --dry-run
      - run: python scripts/ci/check_eval_ingestion_config.py
      - run: python scripts/ci/check_ingestion_pipeline_config.py
      - run: python scripts/ci/python_dependency_audit.py
      - run: python scripts/ci/check_sandbox_isolation_config.py
      - run: python scripts/ci/check_container_scan_config.py
      - run: python scripts/ci/check_metrics_token_materializer.py
      - run: python scripts/ci/check_observability_config.py
      - run: python scripts/ci/check_prod_profile_config.py
      - run: python scripts/ci/check_marketing_compatibility_config.py
      - run: npm --workspace @hallu-defense/console run test:browserstack:config
      - run: python scripts/ci/check_helm_chart.py
      - run: npm audit --audit-level=high
      - run: npm audit --omit=dev --audit-level=high
  first-party-images:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: console
            dockerfile: infra/docker/console.Dockerfile
          - name: sandbox
            dockerfile: infra/docker/sandbox.Dockerfile
          - name: pgvector
            dockerfile: infra/docker/pgvector.Dockerfile
          - name: keycloak
            dockerfile: infra/docker/keycloak.Dockerfile
          - name: grafana
            dockerfile: infra/docker/grafana.Dockerfile
          - name: opensearch
            dockerfile: infra/docker/opensearch.Dockerfile
          - name: seaweedfs
            dockerfile: infra/docker/seaweedfs.Dockerfile
          - name: otel-collector
            dockerfile: infra/docker/otel-collector.Dockerfile
          - name: vault
            dockerfile: infra/docker/vault.Dockerfile
    steps:
      - name: Create empty external Trivy policy
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0755 "${RUNNER_TEMP}/hallu-trivy-policy"
          printf '{}\n' > "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml"
          : > "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
          chmod 0444 "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml" \
            "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
      - name: Reclaim unused hosted runner SDKs
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf -- /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
          docker builder prune --all --force
          available_kb="$(df --output=avail -k / | tail -n 1 | tr -d ' ')"
          test "${available_kb}" -ge 20971520
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build current first-party image
        run: >-
          docker build -f "${{ matrix.dockerfile }}"
          -t "hallu-defense-${{ matrix.name }}:ci" .
      - name: Scan current first-party image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-${{ matrix.name }}:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivy-config: ${{ runner.temp }}/hallu-trivy-policy/trivy.yaml
          trivyignores: ${{ runner.temp }}/hallu-trivy-policy/empty.trivyignore

  third-party-images:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        image:
          - prom/prometheus:v3.13.1-distroless@sha256:214f8427c8fba80c327bb94a75feb802ae12f2d6ca30812aa6e7d22f09bbea80
          - redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    steps:
      - name: Create empty external Trivy policy
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0755 "${RUNNER_TEMP}/hallu-trivy-policy"
          printf '{}\n' > "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml"
          : > "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
          chmod 0444 "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml" \
            "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
      - name: Scan immutable third-party image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivy-config: ${{ runner.temp }}/hallu-trivy-policy/trivy.yaml
          trivyignores: ${{ runner.temp }}/hallu-trivy-policy/empty.trivyignore
