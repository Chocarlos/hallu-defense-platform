name: security

on:
  pull_request:
  push:
    branches: ["master", "main"]

permissions:
  contents: read

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  security-check:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - run: python scripts/ci/install_python_lock.py build-tools
      - run: python scripts/ci/compile_python_locks.py --check
      - run: python scripts/ci/install_python_lock.py dev
      - run: test "$(npm --version)" = "11.16.0"
      - run: npm ci
      - run: python scripts/ci/check_python_reproducibility.py
      - name: Install pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          printf '%s  %s\n' "$GITLEAKS_LINUX_X64_SHA256" "$archive" | sha256sum --check
          mkdir -p "$RUNNER_TEMP/gitleaks-bin"
          tar -xzf "$archive" -C "$RUNNER_TEMP/gitleaks-bin" gitleaks
          chmod 0755 "$RUNNER_TEMP/gitleaks-bin/gitleaks"
          echo "GITLEAKS_BINARY=$RUNNER_TEMP/gitleaks-bin/gitleaks" >> "$GITHUB_ENV"
          test "$("$RUNNER_TEMP/gitleaks-bin/gitleaks" version)" = "v${GITLEAKS_VERSION}"
      - run: python scripts/ci/check_gitleaks_config.py
      - run: python scripts/ci/run_gitleaks.py
      - name: Exercise real Gitleaks fixtures
        run: python -m pytest -q apps/api/tests/test_gitleaks_gate.py
        env:
          HALLU_DEFENSE_GITLEAKS_LIVE_TEST: "true"
      - run: python scripts/ci/secret_scan.py
      - run: python scripts/ci/check_encryption_config.py
      - run: python scripts/ci/check_auth_config.py
      - run: python scripts/ci/oidc_provider_smoke.py
      - run: python scripts/ci/check_secrets_config.py
      - run: python scripts/ci/check_audit_ledger_config.py
      - run: python scripts/ci/check_approval_queue_config.py
      - run: python scripts/ci/check_corpus_grants_config.py
      - run: python scripts/ci/check_backup_retention_config.py
      - run: python scripts/ci/check_minio_backup_drill.py
      - run: python scripts/ci/check_rag_persistence_config.py
      - run: python scripts/ci/check_postgres_migrations.py
      - run: python scripts/dev/bootstrap_opensearch_template.py --dry-run
      - run: python scripts/ci/check_eval_ingestion_config.py
      - run: python scripts/ci/check_ingestion_pipeline_config.py
      - run: python scripts/ci/python_dependency_audit.py
      - run: python scripts/ci/check_sandbox_isolation_config.py
      - run: python scripts/ci/check_container_scan_config.py
      - run: python scripts/ci/check_metrics_token_materializer.py
      - run: python scripts/ci/check_observability_config.py
      - run: python scripts/ci/check_prod_profile_config.py
      - run: python scripts/ci/check_helm_chart.py
      - run: npm audit --audit-level=high
      - run: npm audit --omit=dev --audit-level=high
      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t hallu-defense-api:ci .
      - name: Scan API image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-api:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build console image
        run: docker build -f infra/docker/console.Dockerfile -t hallu-defense-console:ci .
      - name: Scan console image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-console:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build sandbox image
        run: docker build -f infra/docker/sandbox.Dockerfile -t hallu-defense-sandbox:ci .
      - name: Scan sandbox image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-sandbox:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build pgvector image
        run: docker build -f infra/docker/pgvector.Dockerfile -t hallu-defense-pgvector:ci .
      - name: Scan pgvector image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-pgvector:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build Keycloak image
        run: docker build -f infra/docker/keycloak.Dockerfile -t hallu-defense-keycloak:ci .
      - name: Scan Keycloak image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-keycloak:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build Grafana image
        run: docker build -f infra/docker/grafana.Dockerfile -t hallu-defense-grafana:ci .
      - name: Scan Grafana image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-grafana:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build OpenSearch image
        run: docker build -f infra/docker/opensearch.Dockerfile -t hallu-defense-opensearch:ci .
      - name: Scan OpenSearch image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-opensearch:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build SeaweedFS image
        run: docker build -f infra/docker/seaweedfs.Dockerfile -t hallu-defense-seaweedfs:ci .
      - name: Scan SeaweedFS image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-seaweedfs:ci
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH

  third-party-images:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        image:
          - prom/prometheus:v3.13.0-distroless@sha256:f3b6aae627d96e7ad8256cdf6de5953247735117c6f577383fadb42efeeea7bc
          - otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
          - redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
          - hashicorp/vault:2.0.3@sha256:a296a888b118615dc01d5f1a6846e6d4a7277946caaed5b447008fff5fe06b54
    steps:
      - name: Scan immutable third-party image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: ${{ matrix.image }}
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
