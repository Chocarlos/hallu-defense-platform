name: security

on:
  pull_request:
  push:
    branches: ["master", "main"]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: python -m pip install -e "apps/api[dev]"
      - run: npm install
      - run: python scripts/ci/secret_scan.py
      - run: python scripts/ci/check_encryption_config.py
      - run: python scripts/ci/check_auth_config.py
      - run: python scripts/ci/oidc_provider_smoke.py
      - run: python scripts/ci/check_secrets_config.py
      - run: python scripts/ci/check_audit_ledger_config.py
      - run: python scripts/ci/check_approval_queue_config.py
      - run: python scripts/ci/check_corpus_grants_config.py
      - run: python scripts/ci/check_backup_retention_config.py
      - run: python scripts/ci/check_rag_persistence_config.py
      - run: python scripts/dev/bootstrap_opensearch_template.py --dry-run
      - run: python scripts/ci/check_ingestion_pipeline_config.py
      - run: python scripts/ci/python_dependency_audit.py
      - run: python scripts/ci/check_sandbox_isolation_config.py
      - run: python scripts/ci/check_container_scan_config.py
      - run: python scripts/ci/check_observability_config.py
      - run: npm audit --omit dev
      - name: Build API image
        run: docker build -f infra/docker/api.Dockerfile -t hallu-defense-api:ci .
      - name: Scan API image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hallu-defense-api:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build console image
        run: docker build -f infra/docker/console.Dockerfile -t hallu-defense-console:ci .
      - name: Scan console image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hallu-defense-console:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
      - name: Build sandbox image
        run: docker build -f infra/docker/sandbox.Dockerfile -t hallu-defense-sandbox:ci .
      - name: Scan sandbox image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: hallu-defense-sandbox:ci
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH
