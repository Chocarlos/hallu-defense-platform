name: live

# Live integration smokes against real backing services.
#
# Unlike ci.yml / security.yml (which stay offline and skip the live smokes),
# this workflow provisions each dependency with `docker compose up -d <svc>` and
# runs the matching `scripts/dev/live_*_smoke.py` with its env-gate flipped to
# `true`. Compose (not GitHub `services:`) is used on purpose: the services need
# repo bind mounts to work -- postgres mounts `infra/rag/pgvector` as its initdb
# schema and keycloak mounts `infra/security/keycloak` as its realm import.
#
# Every job has an `if: always()` teardown so a failed smoke never leaks its
# process/container resources. Jobs that share local developer services stop
# only the service they started instead of deleting unrelated volumes.
#
# Extensible by design: live jobs here follow the same
# start -> wait-for-readiness -> gated-smoke -> teardown shape. ci.yml and
# security.yml keep live smokes out of default CI.

on:
  workflow_dispatch:
  push:
    branches: ["master", "main"]
  schedule:
    # Weekly, Mondays at 06:00 UTC.
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  PYTHONPATH: ${{ github.workspace }}/apps/api/src

jobs:
  minio-backup-restore-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: hallu-minio-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start isolated MinIO-compatible store
        run: docker compose up -d minio
      - name: Wait for S3 endpoint
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            if curl --silent --output /dev/null --connect-timeout 1 http://127.0.0.1:9000/; then
              echo "S3 endpoint is ready"
              exit 0
            fi
            echo "waiting for S3 endpoint (attempt ${attempt})..."
            sleep 2
          done
          echo "S3 endpoint did not become ready" >&2
          docker compose logs minio
          exit 1
      - name: Exercise encrypted tenant-scoped backup and restore
        env:
          HALLU_DEFENSE_ENV: ci
          HALLU_DEFENSE_MINIO_BACKUP_ENDPOINT: http://127.0.0.1:9000
          HALLU_DEFENSE_MINIO_BACKUP_ACCESS_KEY: minioadmin
          HALLU_DEFENSE_MINIO_BACKUP_SECRET_KEY: minioadmin
        shell: bash
        run: |
          set -euo pipefail
          HALLU_DEFENSE_SECRET_BACKUP_ENCRYPTION_KEY="$(python -c "import base64, secrets; print(base64.urlsafe_b64encode(secrets.token_bytes(32)).decode('ascii'))")"
          export HALLU_DEFENSE_SECRET_BACKUP_ENCRYPTION_KEY
          python -m pytest -q apps/api/tests/test_live_minio_backup_restore_drill.py --suite-lane=live
      - name: Teardown exact scratch resources
        if: always()
        shell: bash
        run: |
          set -u
          failures=0
          docker compose stop minio || failures=1
          docker compose rm -f minio || failures=1
          docker volume rm "${COMPOSE_PROJECT_NAME}_seaweedfs-data" || failures=1
          docker network rm "${COMPOSE_PROJECT_NAME}_default" || failures=1
          exit "${failures}"

  hybrid-rag-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      COMPOSE_PROJECT_NAME: hallu-hybrid-rag-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start isolated PostgreSQL and OpenSearch
        run: docker compose up -d postgres opensearch
      - name: Wait for both persistent stores
        run: |
          for attempt in $(seq 1 60); do
            if docker compose logs postgres 2>&1 \
              | grep -Fq "PostgreSQL init process complete; ready for start up" \
              && docker compose exec -T postgres pg_isready -U hallu -d postgres \
              && curl --max-time 2 -fsS http://localhost:9200/_cluster/health > /dev/null; then
              echo "PostgreSQL and OpenSearch are ready"
              exit 0
            fi
            echo "waiting for hybrid stores (attempt ${attempt})..."
            sleep 2
          done
          echo "hybrid stores did not become ready" >&2
          docker compose logs postgres opensearch
          exit 1
      - name: Run combined hybrid RAG live smoke in scratch resources
        env:
          HALLU_DEFENSE_LIVE_HYBRID_RAG_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_LIVE_HYBRID_RAG_ADMIN_DSN: postgresql://hallu:hallu@localhost:5432/postgres
          HALLU_DEFENSE_OPENSEARCH_ENDPOINT: http://localhost:9200
          HALLU_DEFENSE_RAG_INDEX_TIMEOUT_SECONDS: "5"
        run: python scripts/dev/live_hybrid_rag_smoke.py
      - name: Teardown isolated hybrid stores
        if: always()
        run: docker compose down -v

  postgres-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start postgres
        run: docker compose up -d postgres
      - name: Wait for postgres readiness
        run: |
          for attempt in $(seq 1 60); do
            if docker compose logs postgres 2>&1 \
              | grep -Fq "PostgreSQL init process complete; ready for start up" \
              && docker compose exec -T postgres pg_isready -U hallu -d hallu_defense; then
              echo "postgres is ready"
              exit 0
            fi
            echo "waiting for postgres (attempt ${attempt})..."
            sleep 2
          done
          echo "postgres did not become ready in time" >&2
          docker compose logs postgres
          exit 1
      - name: Run postgres persistence live smoke
        env:
          HALLU_DEFENSE_LIVE_POSTGRES_PERSISTENCE_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_POSTGRES_DSN: postgresql://hallu:hallu@localhost:5432/hallu_defense
        run: python scripts/dev/live_postgres_persistence_smoke.py
      - name: Teardown
        if: always()
        run: docker compose down -v

  keycloak-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      COMPOSE_PROJECT_NAME: hallu-keycloak-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start keycloak
        run: docker compose up -d keycloak
      - name: Wait for keycloak discovery
        run: |
          discovery_url="http://localhost:8081/realms/hallu-defense/.well-known/openid-configuration"
          # ~5 min deadline: optimized Keycloak + PostgreSQL realm import can warm slowly.
          for attempt in $(seq 1 60); do
            if curl -fsS "${discovery_url}" > /dev/null 2>&1; then
              echo "keycloak discovery is reachable"
              exit 0
            fi
            echo "waiting for keycloak discovery (attempt ${attempt})..."
            sleep 5
          done
          echo "keycloak discovery not reachable before the deadline" >&2
          docker compose logs keycloak
          exit 1
      - name: Start OIDC-backed Uvicorn API and wait for readiness
        env:
          HALLU_DEFENSE_ENV: local
          HALLU_DEFENSE_RUNTIME_ROLE: api
          HALLU_DEFENSE_AUTH_REQUIRED: "true"
          HALLU_DEFENSE_AUTH_CLAIMS_MODE: oidc_jwt
          HALLU_DEFENSE_OIDC_ISSUER: http://localhost:8081/realms/hallu-defense
          HALLU_DEFENSE_OIDC_AUDIENCE: hallu-defense-api
          HALLU_DEFENSE_OIDC_DISCOVERY_URL: http://localhost:8081/realms/hallu-defense/.well-known/openid-configuration
          HALLU_DEFENSE_OIDC_SUBJECT_CLAIM: azp
          HALLU_DEFENSE_OIDC_ROLES_CLAIM: roles
          HALLU_DEFENSE_OIDC_TENANT_CLAIM: tenant_id
          HALLU_DEFENSE_PROVIDER_BACKEND: mock
          HALLU_DEFENSE_AUDIT_LEDGER_BACKEND: memory
          HALLU_DEFENSE_OTEL_ENABLED: "false"
        run: |
          nohup python -m uvicorn hallu_defense.main:app \
            --host 127.0.0.1 --port 18081 --no-access-log \
            > keycloak-api.log 2>&1 &
          echo "$!" > keycloak-api.pid
          for attempt in $(seq 1 60); do
            if curl --max-time 2 -fsS http://127.0.0.1:18081/ready > /dev/null 2>&1; then
              echo "OIDC-backed Uvicorn API is ready"
              exit 0
            fi
            echo "waiting for OIDC-backed API (attempt ${attempt})..."
            sleep 2
          done
          echo "OIDC-backed Uvicorn API did not become ready" >&2
          cat keycloak-api.log || true
          exit 1
      - name: Run Keycloak OIDC live API smoke
        # NOTE: scripts/dev/live_keycloak_oidc_smoke.py reads the
        # HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_* env names (verified in
        # `_config_from_env`), not the generic HALLU_DEFENSE_OIDC_* settings
        # names. These values match infra/security/keycloak/realm-hallu-defense.json.
        env:
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_ISSUER: http://localhost:8081/realms/hallu-defense
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_AUDIENCE: hallu-defense-api
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_DISCOVERY_URL: http://localhost:8081/realms/hallu-defense/.well-known/openid-configuration
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_SUBJECT_CLAIM: azp
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_CLIENT_ID: hallu-defense-api
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_CLIENT_SECRET: local-dev-only
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_EXPECTED_SUBJECT: hallu-defense-api
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_EXPECTED_TENANT: tenant-a
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_REQUIRED_ROLE: approval_reviewer
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_API_BASE_URL: http://127.0.0.1:18081
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_LIMITED_CLIENT_ID: hallu-defense-limited
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_LIMITED_CLIENT_SECRET: limited-only
          HALLU_DEFENSE_LIVE_KEYCLOAK_OIDC_LIMITED_EXPECTED_SUBJECT: hallu-defense-limited
        run: python scripts/dev/live_keycloak_oidc_smoke.py --api
      - name: Install and build the Console smoke runtime
        run: |
          test "$(npm --version)" = "11.16.0"
          npm ci
          npm audit --audit-level=high
          npm --workspace @hallu-defense/contracts run build
          npm --workspace @hallu-defense/sdk run build
          npm --workspace @hallu-defense/console run build
          npx playwright install --with-deps chromium
      - name: Start OIDC Console and wait for readiness
        env:
          HALLU_DEFENSE_ENV: test
          HALLU_DEFENSE_CONSOLE_AUTH_MODE: oidc
          HALLU_DEFENSE_CONSOLE_PUBLIC_ORIGIN: http://127.0.0.1:3100
          HALLU_DEFENSE_CONSOLE_API_ORIGIN: http://127.0.0.1:18123
          HALLU_DEFENSE_CONSOLE_ALLOW_INSECURE_LOCAL_HTTP: "true"
          HALLU_DEFENSE_CONSOLE_OIDC_ISSUER: http://localhost:8081/realms/hallu-defense
          HALLU_DEFENSE_CONSOLE_OIDC_CLIENT_ID: hallu-defense-console
          HALLU_DEFENSE_CONSOLE_OIDC_API_AUDIENCE: hallu-defense-api
          HALLU_DEFENSE_CONSOLE_OIDC_REQUIRED_ROLES: verifier
        run: |
          nohup npm --workspace @hallu-defense/console run start -- --port 3100 \
            > keycloak-console.log 2>&1 &
          echo "$!" > keycloak-console.pid
          for attempt in $(seq 1 60); do
            if curl --max-time 2 -fsS http://127.0.0.1:3100 > /dev/null 2>&1; then
              echo "OIDC Console is ready"
              exit 0
            fi
            echo "waiting for OIDC Console (attempt ${attempt})..."
            sleep 2
          done
          echo "OIDC Console did not become ready" >&2
          cat keycloak-console.log || true
          exit 1
      - name: Run browser OIDC/BFF live smoke
        env:
          HALLU_DEFENSE_LIVE_CONSOLE_OIDC_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_LIVE_CONSOLE_OIDC_CONSOLE_ORIGIN: http://127.0.0.1:3100
          HALLU_DEFENSE_LIVE_CONSOLE_OIDC_API_ORIGIN: http://127.0.0.1:18123
          HALLU_DEFENSE_LIVE_CONSOLE_OIDC_USERNAME: console-reviewer
          HALLU_DEFENSE_LIVE_CONSOLE_OIDC_PASSWORD: console-reviewer-local-only
        run: make console-oidc-live-smoke
      - name: Teardown
        if: always()
        run: |
          if [ -f keycloak-api.pid ]; then
            api_pid="$(cat keycloak-api.pid)"
            if kill -0 "${api_pid}" 2> /dev/null; then
              kill "${api_pid}"
            fi
            wait "${api_pid}" 2> /dev/null || true
          fi
          if [ -f keycloak-console.pid ]; then
            console_pid="$(cat keycloak-console.pid)"
            if kill -0 "${console_pid}" 2> /dev/null; then
              kill "${console_pid}"
            fi
            wait "${console_pid}" 2> /dev/null || true
          fi
          docker compose stop keycloak || true
          docker compose rm -f keycloak || true

  vault-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      HALLU_DEFENSE_LOCAL_VAULT_DEV_ROOT_TOKEN: dev-root
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start vault
        run: docker compose up -d vault
      - name: Wait for vault readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8200/v1/sys/health > /dev/null 2>&1; then
              echo "vault is ready"
              exit 0
            fi
            echo "waiting for vault (attempt ${attempt})..."
            sleep 2
          done
          echo "vault did not become ready in time" >&2
          docker compose logs vault
          exit 1
      - name: Bootstrap local vault
        env:
          HALLU_DEFENSE_LOCAL_VAULT_ADDR: http://127.0.0.1:8200
          HALLU_DEFENSE_LOCAL_VAULT_TOKEN_ENV: HALLU_DEFENSE_LOCAL_VAULT_DEV_ROOT_TOKEN
        run: python scripts/dev/bootstrap_local_vault.py
      - name: Run Vault secrets live smoke
        env:
          HALLU_DEFENSE_LIVE_VAULT_SECRETS_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_LIVE_VAULT_ADDR: http://127.0.0.1:8200
          HALLU_DEFENSE_LIVE_VAULT_MOUNT: secret
          HALLU_DEFENSE_LIVE_VAULT_TOKEN_ENV: HALLU_DEFENSE_LOCAL_VAULT_DEV_ROOT_TOKEN
        run: python scripts/dev/live_vault_secrets_smoke.py
      - name: Teardown
        if: always()
        run: docker compose down -v

  observability-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Prepare ephemeral OTEL output directory
        run: sudo install -d -o 10001 -g 10001 -m 0755 var/otel
      - name: Start observability stack
        run: docker compose up -d --build grafana
      - name: Wait for API readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health > /dev/null 2>&1; then
              echo "api is ready"
              exit 0
            fi
            echo "waiting for api (attempt ${attempt})..."
            sleep 2
          done
          echo "api did not become ready in time" >&2
          docker compose logs api
          exit 1
      - name: Wait for Prometheus readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:9090/-/ready > /dev/null 2>&1; then
              echo "prometheus is ready"
              exit 0
            fi
            echo "waiting for prometheus (attempt ${attempt})..."
            sleep 2
          done
          echo "prometheus did not become ready in time" >&2
          docker compose logs prometheus
          exit 1
      - name: Wait for Grafana readiness
        run: |
          for attempt in $(seq 1 60); do
            if curl -fsS http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "grafana is ready"
              exit 0
            fi
            echo "waiting for grafana (attempt ${attempt})..."
            sleep 2
          done
          echo "grafana did not become ready in time" >&2
          docker compose logs grafana
          exit 1
      - name: Run OTEL export live check
        env:
          HALLU_DEFENSE_LIVE_OTEL_EXPORT_CHECK_ENABLED: "true"
          HALLU_DEFENSE_LIVE_OTEL_EXPORT_CHECK_API_BASE_URL: http://localhost:8000
          HALLU_DEFENSE_LIVE_OTEL_EXPORT_CHECK_SPANS_PATH: var/otel/spans.jsonl
        run: |
          if ! python scripts/dev/live_otel_export_check.py; then
            ls -la var/otel || true
            docker compose logs api otel-collector || true
            exit 1
          fi
      - name: Run observability live smoke
        env:
          HALLU_DEFENSE_LIVE_OBSERVABILITY_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_LIVE_OBSERVABILITY_API_URL: http://localhost:8000
          HALLU_DEFENSE_LIVE_OBSERVABILITY_PROMETHEUS_URL: http://localhost:9090
          HALLU_DEFENSE_LIVE_OBSERVABILITY_GRAFANA_URL: http://localhost:3001
          GRAFANA_ADMIN_USER: admin
          GRAFANA_ADMIN_PASSWORD: change-me
        run: python scripts/dev/live_observability_smoke.py
      - name: Teardown
        if: always()
        run: docker compose down -v

  sandbox-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [postgres-live, keycloak-live]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Build sandbox image
        run: docker build -f infra/docker/sandbox.Dockerfile -t hallu-defense-sandbox:ci .
      - name: Run Docker sandbox live smoke
        env:
          HALLU_DEFENSE_LIVE_DOCKER_SANDBOX_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_ALLOWED_WORKSPACE: ${{ github.workspace }}
          HALLU_DEFENSE_SANDBOX_BACKEND: docker
          HALLU_DEFENSE_SANDBOX_DOCKER_IMAGE: hallu-defense-sandbox:ci
          HALLU_DEFENSE_SANDBOX_DOCKER_PATH: docker
        run: python scripts/dev/live_docker_sandbox_smoke.py

  prod-profile-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Run production profile e2e scaffold
        env:
          HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_ENABLED: ${{ vars.HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_ENABLED || 'false' }}
          HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_API_URL: ${{ vars.HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_API_URL || 'https://api.example.invalid' }}
          HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_BEARER_TOKEN: ${{ secrets.HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_BEARER_TOKEN }}
          HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_TENANT: ${{ vars.HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_TENANT || 'tenant-a' }}
          HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_REPO_REF: ${{ vars.HALLU_DEFENSE_LIVE_PROD_PROFILE_E2E_REPO_REF }}
        run: python scripts/dev/live_prod_profile_e2e.py

  ingestion-worker-crash-recovery-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      # A unique Compose project prevents this job from adopting or deleting
      # containers and volumes owned by another local/live stack.
      COMPOSE_PROJECT_NAME: hallu-ingestion-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API and PostgreSQL pool driver
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start isolated postgres
        run: docker compose up -d postgres
      - name: Wait for isolated postgres readiness
        run: |
          for attempt in $(seq 1 60); do
            if docker compose logs postgres 2>&1 \
              | grep -Fq "PostgreSQL init process complete; ready for start up" \
              && docker compose exec -T postgres pg_isready -U hallu -d hallu_defense; then
              echo "postgres is ready"
              exit 0
            fi
            echo "waiting for postgres (attempt ${attempt})..."
            sleep 2
          done
          echo "postgres did not become ready in time" >&2
          exit 1
      - name: Run real ingestion worker crash/restart smoke
        env:
          HALLU_DEFENSE_LIVE_INGESTION_WORKER_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_ENV: local
          HALLU_DEFENSE_AUTH_REQUIRED: "false"
          HALLU_DEFENSE_PROVIDER_BACKEND: mock
          HALLU_DEFENSE_OTEL_ENABLED: "false"
          HALLU_DEFENSE_POSTGRES_DSN: postgresql://hallu:hallu@localhost:5432/hallu_defense
          HALLU_DEFENSE_RAG_INDEX_BACKEND: pgvector
          HALLU_DEFENSE_AUDIT_LEDGER_BACKEND: postgres
          HALLU_DEFENSE_CORPUS_GRANTS_BACKEND: postgres
          HALLU_DEFENSE_INGESTION_MODE: async
        run: python scripts/dev/live_ingestion_worker_smoke.py
      - name: Teardown only isolated ingestion postgres
        if: always()
        run: |
          docker compose stop postgres || true
          docker compose rm -f postgres || true
          docker volume rm "${COMPOSE_PROJECT_NAME}_postgres-data" || true
          docker network rm "${COMPOSE_PROJECT_NAME}_default" || true

  kind-helm-live:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      HALLU_DEFENSE_LIVE_KIND_NODE_IMAGE: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install pinned kind, Helm, and kubectl
        env:
          KIND_VERSION: v0.32.0
          KIND_SHA256: 50030de23cf40a18505f20426f6a8506bedf13c6e509244bd1fa9463721b0f54
          HELM_VERSION: v4.2.2
          HELM_SHA256: 9adafecab4d406853bba163a70e9f104f47dbbf65ce24b7653bae7e36150bcb6
          KUBECTL_VERSION: v1.36.1
          KUBECTL_SHA256: 629d3f410e09bf49b64ae7079f7f0bda1191efed311f7d37fdbab0ad5b0ec2b7
        run: |
          helm_archive="$RUNNER_TEMP/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          helm_extract="$RUNNER_TEMP/helm-${HELM_VERSION}"
          curl -fsSL --output "$helm_archive" "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          printf '%s  %s\n' "${HELM_SHA256}" "$helm_archive" | sha256sum --check
          mkdir -p "$helm_extract"
          tar -xzf "$helm_archive" -C "$helm_extract"
          sudo install "$helm_extract/linux-amd64/helm" /usr/local/bin/helm

          kind_binary="$RUNNER_TEMP/kind-linux-amd64"
          curl -fsSL --output "$kind_binary" "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          printf '%s  %s\n' "${KIND_SHA256}" "$kind_binary" | sha256sum --check
          sudo install "$kind_binary" /usr/local/bin/kind

          kubectl_binary="$RUNNER_TEMP/kubectl"
          curl -fsSL --output "$kubectl_binary" "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          printf '%s  %s\n' "${KUBECTL_SHA256}" "$kubectl_binary" | sha256sum --check
          sudo install "$kubectl_binary" /usr/local/bin/kubectl

          helm version --short
          kind version
          kubectl version --client
      - name: Prepare OpenSearch kernel requirement
        run: sudo sysctl -w vm.max_map_count=262144
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Run kind/Helm live installation smoke
        env:
          HALLU_DEFENSE_LIVE_KIND_HELM_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
          HALLU_DEFENSE_LIVE_KIND_HELM_NAMESPACE: ${{ vars.HALLU_DEFENSE_LIVE_KIND_HELM_NAMESPACE || 'hallu-defense' }}
        run: python scripts/dev/live_kind_helm_smoke.py
      - name: Teardown only the exact scratch kind cluster and image tags
        if: always()
        env:
          HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set +e
          failures=0
          cluster="hallu-defense-smoke-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
          clusters_before="$(kind get clusters 2>&1)"
          if [ "$?" -ne 0 ]; then
            echo "could not inventory kind clusters before cleanup: ${clusters_before}" >&2
            failures=1
          elif printf '%s\n' "${clusters_before}" | grep -Fxq "${cluster}"; then
            if ! kind delete cluster --name "${cluster}"; then
              echo "failed to delete exact scratch cluster: ${cluster}" >&2
              failures=1
            fi
          fi

          images=(
            "hallu-defense-api:kind-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
            "hallu-defense-console:kind-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
            "hallu-defense-sandbox:kind-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
            "hallu-defense-pgvector:kind-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
            "hallu-defense-opensearch:kind-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
            "hallu-defense-vault:kind-${HALLU_DEFENSE_LIVE_KIND_HELM_RUN_ID}"
          )
          images_before="$(docker image ls --format '{{.Repository}}:{{.Tag}}' 2>&1)"
          if [ "$?" -ne 0 ]; then
            echo "could not inventory Docker images before cleanup: ${images_before}" >&2
            failures=1
          else
            for image in "${images[@]}"; do
              if printf '%s\n' "${images_before}" | grep -Fxq "${image}"; then
                if ! docker image rm "${image}"; then
                  echo "failed to remove exact scratch image tag: ${image}" >&2
                  failures=1
                fi
              fi
            done
          fi

          clusters_after="$(kind get clusters 2>&1)"
          if [ "$?" -ne 0 ]; then
            echo "could not verify kind cluster cleanup: ${clusters_after}" >&2
            failures=1
          elif printf '%s\n' "${clusters_after}" | grep -Fxq "${cluster}"; then
            echo "scratch kind cluster still exists: ${cluster}" >&2
            failures=1
          fi
          images_after="$(docker image ls --format '{{.Repository}}:{{.Tag}}' 2>&1)"
          if [ "$?" -ne 0 ]; then
            echo "could not verify Docker image cleanup: ${images_after}" >&2
            failures=1
          else
            for image in "${images[@]}"; do
              if printf '%s\n' "${images_after}" | grep -Fxq "${image}"; then
                echo "scratch image tag still exists: ${image}" >&2
                failures=1
              fi
            done
          fi
          exit "${failures}"

  eval-reports-live:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [postgres-live, keycloak-live]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - name: Start postgres
        run: docker compose up -d postgres
      - name: Wait for postgres readiness
        run: |
          for attempt in $(seq 1 60); do
            if docker compose logs postgres 2>&1 \
              | grep -Fq "PostgreSQL init process complete; ready for start up" \
              && docker compose exec -T postgres pg_isready -U hallu -d hallu_defense; then
              echo "postgres is ready"
              exit 0
            fi
            echo "waiting for postgres (attempt ${attempt})..."
            sleep 2
          done
          echo "postgres did not become ready in time" >&2
          docker compose logs postgres
          exit 1
      - name: Apply Postgres migrations
        env:
          HALLU_DEFENSE_POSTGRES_DSN: postgresql://hallu:hallu@localhost:5432/hallu_defense
        run: python scripts/dev/apply_postgres_migrations.py
      - name: Start API with Postgres eval report backend
        env:
          HALLU_DEFENSE_POSTGRES_DSN: postgresql://hallu:hallu@localhost:5432/hallu_defense
          HALLU_DEFENSE_EVAL_REPORTS_BACKEND: postgres
        run: |
          nohup python -m uvicorn hallu_defense.main:app --host 127.0.0.1 --port 18080 > eval-api.log 2>&1 &
          echo $! > eval-api.pid
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:18080/health > /dev/null 2>&1; then
              echo "api is ready"
              exit 0
            fi
            echo "waiting for api (attempt ${attempt})..."
            sleep 2
          done
          echo "api did not become ready in time" >&2
          cat eval-api.log || true
          exit 1
      - name: Run eval report publish live smoke
        env:
          HALLU_DEFENSE_LIVE_EVAL_REPORT_PUBLISH_SMOKE_ENABLED: "true"
          HALLU_DEFENSE_EVAL_REPORT_PUBLISH_API_URL: http://127.0.0.1:18080
          HALLU_DEFENSE_EVAL_REPORT_PUBLISH_RUN_ID: live-${{ github.run_id }}
        run: python scripts/dev/publish_eval_reports.py --live-smoke
      - name: Teardown
        if: always()
        run: |
          if [ -f eval-api.pid ]; then
            kill "$(cat eval-api.pid)" || true
          fi
          docker compose down -v
