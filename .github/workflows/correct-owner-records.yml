name: correct-owner-records

on:
  push:
    branches: ["codex/public-stabilization-v0.1.0"]
    paths:
      - ".github/workflows/correct-owner-records.yml"

permissions:
  contents: write

jobs:
  correct:
    if: >-
      github.repository == 'Chocarlos/hallu-defense-platform' &&
      github.ref == 'refs/heads/codex/public-stabilization-v0.1.0'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: codex/public-stabilization-v0.1.0
          persist-credentials: false
      - name: Correct the two governed ownership records
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          expected = {
              Path("docs/WORKLOG.md"): 1,
              Path("docs/TRACEABILITY_MATRIX.md"): 1,
          }
          for path, expected_count in expected.items():
              text = path.read_text(encoding="utf-8")
              observed = text.count("Xocarlos")
              if observed != expected_count:
                  raise SystemExit(
                      f"{path}: expected {expected_count} incorrect spelling, found {observed}"
                  )
              path.write_text(text.replace("Xocarlos", "Chocarlos"), encoding="utf-8")
          PY
          if git grep -n -I -F 'Xocarlos' -- docs/WORKLOG.md docs/TRACEABILITY_MATRIX.md; then
            echo "incorrect owner spelling remains in governed records" >&2
            exit 1
          fi
          git diff --check
      - name: Commit the governed correction
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git add -- docs/WORKLOG.md docs/TRACEABILITY_MATRIX.md
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: correct Chocarlos ownership records"
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${GITHUB_REF_NAME}"
