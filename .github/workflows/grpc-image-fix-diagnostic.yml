name: grpc-image-fix-diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  images:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: api
            dockerfile: infra/docker/api.Dockerfile
          - name: prometheus
            dockerfile: infra/docker/prometheus.Dockerfile
    steps:
      - name: Create exact empty Trivy policy
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0755 "${RUNNER_TEMP}/hallu-trivy-policy"
          printf '{}\n' > "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml"
          : > "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
          chmod 0444 "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml" \
            "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
      - name: Reclaim unused hosted runner SDKs
        shell: bash
        run: |
          set -euo pipefail
          sudo rm -rf -- /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/.ghcup
          docker builder prune --all --force
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build patched image
        run: docker build -f "${{ matrix.dockerfile }}" -t "hallu-defense-${{ matrix.name }}:grpc-fix" .
      - name: Verify runtime identity
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.name }}" = "api" ]; then
            docker run --rm --entrypoint /usr/local/bin/opa \
              "hallu-defense-${{ matrix.name }}:grpc-fix" version
            docker run --rm --entrypoint /usr/local/bin/opa \
              "hallu-defense-${{ matrix.name }}:grpc-fix" \
              check --strict /app/infra/opa/policies
          else
            docker run --rm "hallu-defense-${{ matrix.name }}:grpc-fix" --version
            docker run --rm --entrypoint /bin/promtool \
              "hallu-defense-${{ matrix.name }}:grpc-fix" --version
          fi
      - name: Scan patched image without exceptions
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: hallu-defense-${{ matrix.name }}:grpc-fix
          format: table
          exit-code: "1"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivy-config: ${{ runner.temp }}/hallu-trivy-policy/trivy.yaml
          trivyignores: ${{ runner.temp }}/hallu-trivy-policy/empty.trivyignore
