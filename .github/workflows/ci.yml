name: ci

on:
  pull_request:
  push:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      PYTHONPATH: ${{ github.workspace }}/apps/api/src
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - name: Install API
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/compile_python_locks.py --check
          python scripts/ci/install_python_lock.py dev
          python scripts/ci/check_python_reproducibility.py
      - name: Install pinned Helm for chart and negative-value gates
        env:
          HELM_VERSION: v4.2.2
          HELM_SHA256: 9adafecab4d406853bba163a70e9f104f47dbbf65ce24b7653bae7e36150bcb6
        run: |
          archive="$RUNNER_TEMP/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          extract_dir="$RUNNER_TEMP/helm-${HELM_VERSION}"
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          printf '%s  %s\n' "${HELM_SHA256}" "$archive" | sha256sum --check
          mkdir -p "$extract_dir"
          tar -xzf "$archive" -C "$extract_dir"
          sudo install "$extract_dir/linux-amd64/helm" /usr/local/bin/helm
          test "$(helm version --short)" = "v4.2.2+gb05881c"
      - name: Lint Python
        run: python -m ruff check apps/api/src apps/api/tests scripts evals
      - name: Typecheck Python
        run: python -m mypy apps/api/src
      - name: Check JSON Schema contracts
        run: python scripts/ci/check_json_schemas.py
      - name: Test API
        run: python -m pytest apps/api/tests --suite-lane=auto
      - name: Check OpenAPI drift
        run: python scripts/ci/check_openapi.py
      - name: Check semantic contract versions
        run: python scripts/ci/check_contract_versions.py
      - name: Check foundation docs
        run: python scripts/ci/check_foundation_docs.py
      - name: Check foundation infrastructure
        run: python scripts/ci/check_foundation_infra.py
      - name: Check pinned Gitleaks configuration
        run: python scripts/ci/check_gitleaks_config.py
      - name: Check traceability matrix
        run: python scripts/ci/check_traceability_matrix.py
      - name: Check worklog
        run: python scripts/ci/check_worklog.py
      - name: Check eval thresholds config
        run: python scripts/ci/check_eval_thresholds_config.py
      - name: Check eval ingestion config
        run: python scripts/ci/check_eval_ingestion_config.py
      - name: Check verifier calibration drift
        run: python scripts/ci/check_verifier_calibration.py
      - name: Install OPA
        uses: open-policy-agent/setup-opa@b2b258e089860efaadaaf71bf6e3aecb4a3eeff1 # v2.4.0
        with:
          version: 1.18.2
          static: "true"
      - name: Test policies
        run: python scripts/ci/run_policy_tests.py
      - name: Check encryption config
        run: python scripts/ci/check_encryption_config.py
      - name: Check release security config
        run: python scripts/ci/check_release_security_config.py
      - name: Check release encryption verification workflow
        run: python scripts/ci/check_release_encryption_workflow.py
      - name: Check auth config
        run: python scripts/ci/check_auth_config.py
      - name: OIDC provider smoke
        run: python scripts/ci/oidc_provider_smoke.py
      - name: Check secrets config
        run: python scripts/ci/check_secrets_config.py
      - name: Check audit ledger config
        run: python scripts/ci/check_audit_ledger_config.py
      - name: Check approval queue config
        run: python scripts/ci/check_approval_queue_config.py
      - name: Check corpus grants config
        run: python scripts/ci/check_corpus_grants_config.py
      - name: Check backup and retention config
        run: python scripts/ci/check_backup_retention_config.py
      - name: Check encrypted MinIO backup drill
        run: python scripts/ci/check_minio_backup_drill.py
      - name: Check RAG persistence config
        run: python scripts/ci/check_rag_persistence_config.py
      - name: Check PostgreSQL migration invariants
        run: python scripts/ci/check_postgres_migrations.py
      - name: Dry-run OpenSearch template bootstrap
        run: python scripts/dev/bootstrap_opensearch_template.py --dry-run
      - name: Check ingestion pipeline config
        run: python scripts/ci/check_ingestion_pipeline_config.py
      - name: Audit Python dependencies
        run: python scripts/ci/python_dependency_audit.py
      - name: Check Grafana dashboards
        run: python scripts/ci/check_grafana_dashboards.py
      - name: Check local runtime config
        run: python scripts/ci/check_local_runtime_config.py
      - name: Check metrics token materializer
        run: python scripts/ci/check_metrics_token_materializer.py
      - name: Check observability config
        run: python scripts/ci/check_observability_config.py
      - name: Check production profile config
        run: python scripts/ci/check_prod_profile_config.py
      - name: Check Helm chart
        run: python scripts/ci/check_helm_chart.py

  typescript:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        id: setup-python
        with:
          python-version: "3.12.13"
          pip-version: "26.1.2"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.18.0"
          cache: npm
      - name: Install API for live contract tests
        run: |
          python scripts/ci/install_python_lock.py build-tools
          python scripts/ci/install_python_lock.py dev
      - run: test "$(npm --version)" = "11.16.0"
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
      - name: Check Console production artifacts for fixture leakage
        run: npm --workspace @hallu-defense/console run check:build
      - name: Test Console e2e runtime and cleanup contracts
        run: npm --workspace @hallu-defense/console run test:e2e-static
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run browser e2e
        run: npm run test:e2e
        env:
          E2E_PYTHON_BIN: ${{ steps.setup-python.outputs.python-path }}
          E2E_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
