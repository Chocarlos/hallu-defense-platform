name: align-audit-records

on:
  push:
    branches: ["codex/public-stabilization-v0.1.0"]
    paths:
      - ".github/workflows/align-audit-records.yml"

permissions:
  contents: write

jobs:
  align:
    if: >-
      github.repository == 'Chocarlos/hallu-defense-platform' &&
      github.ref == 'refs/heads/codex/public-stabilization-v0.1.0'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: codex/public-stabilization-v0.1.0
          persist-credentials: false
      - name: Align the governed records with the audited final scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path("docs/TRACEABILITY_MATRIX.md"): (
                  "provider compatibility limits, and failure-only CI diagnostics.",
                  "provider compatibility limits, and a fail-closed ownership spelling check.",
              ),
              Path("docs/WORKLOG.md"): (
                  "- Added failure-only CI diagnostics without changing pass/fail criteria.",
                  "- Temporarily added failure-only CI diagnostics without changing pass/fail criteria; the final audit removed the artifact uploads to avoid retaining additional public failure output.",
              ),
          }
          for path, (old, new) in replacements.items():
              text = path.read_text(encoding="utf-8")
              if text.count(old) != 1:
                  raise SystemExit(f"{path}: expected exactly one reviewed record marker")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
          git diff --check
      - name: Commit the governed record alignment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git add -- docs/WORKLOG.md docs/TRACEABILITY_MATRIX.md
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "docs: align governance records with final audit"
          git push \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:${GITHUB_REF_NAME}"
