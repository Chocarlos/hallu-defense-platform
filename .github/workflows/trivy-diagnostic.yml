name: trivy-diagnostic

on:
  pull_request:
  push:
    branches: ["codex/public-stabilization-v0.1.0"]

permissions:
  contents: read

jobs:
  prometheus-json:
    if: github.repository == 'Chocarlos/hallu-defense-platform'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Create empty external Trivy policy
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 0755 "${RUNNER_TEMP}/hallu-trivy-policy"
          printf '{}\n' > "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml"
          : > "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
          chmod 0444 "${RUNNER_TEMP}/hallu-trivy-policy/trivy.yaml" \
            "${RUNNER_TEMP}/hallu-trivy-policy/empty.trivyignore"
      - name: Capture immutable Prometheus findings without changing the strict gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.72.0
          image-ref: prom/prometheus:v3.13.1-distroless@sha256:214f8427c8fba80c327bb94a75feb802ae12f2d6ca30812aa6e7d22f09bbea80
          format: json
          output: ${{ runner.temp }}/prometheus-trivy.json
          exit-code: "0"
          vuln-type: os,library
          severity: CRITICAL,HIGH
          trivy-config: ${{ runner.temp }}/hallu-trivy-policy/trivy.yaml
          trivyignores: ${{ runner.temp }}/hallu-trivy-policy/empty.trivyignore
      - name: Upload diagnostics
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: prometheus-trivy-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/prometheus-trivy.json
          if-no-files-found: error
          include-hidden-files: false
          compression-level: 6
          overwrite: false
          retention-days: 1
