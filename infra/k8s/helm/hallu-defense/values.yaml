global:
  imagePullPolicy: IfNotPresent
  # Bound writable scratch space so a compromised workload cannot exhaust the
  # node's ephemeral storage through /tmp.
  tmpSizeLimit: 64Mi

nameOverride: ""
fullnameOverride: ""

oidc:
  issuer: ""
  audience: ""
  jwksPath: /run/hallu-defense/keycloak-jwks.json

cors:
  allowOrigins: []

outboundHttps:
  allowedOrigins: []

ragIndex:
  backend: hybrid
  timeoutSeconds: 5

opensearch:
  endpoint: ""
  indexName: hallu_evidence
  # Logical Vault name containing the complete Authorization header. The kind
  # fixture is intentionally unauthenticated and must leave this empty.
  authorizationSecretName: ""
  caPath: /run/hallu-defense/opensearch-ca.pem
  # Optional for endpoints whose issuing CA is not in the image trust store.
  caSecretName: ""
  caSecretKey: ca.crt

postgres:
  caPath: /run/hallu-defense/postgres-ca.pem
  # Production must supply the CA that signs the managed PostgreSQL endpoint.
  caSecretName: ""
  caSecretKey: ca.crt
  # Enabled only by values-kind.yaml for the exact disposable in-cluster host.
  kindInsecureTlsEnabled: false

vault:
  address: ""
  mount: secret
  caPath: /run/hallu-defense/vault-ca.pem
  caSecretName: ""
  caSecretKey: ca.crt

approvalCommitment:
  activeSecretName: approvals/tool-call-commitment-key
  activeKeyId: approval-active-v1
  previousSecretName: ""
  previousKeyId: ""
  previousValidUntil: ""

provider:
  backend: ""
  model: ""
  openaiCompatibleBaseUrl: ""
  apiKeySecretName: ""

otel:
  enabled: true
  exporter: otlp
  endpoint: ""

rateLimit:
  backend: redis
  redis:
    urlSecretName: quotas/tool-validation/redis-url
    timeoutSeconds: 1
    caPath: /run/hallu-defense/redis-ca.pem
    # Production supplies a managed Redis CA Secret with caSecretKey. Kind
    # creates a short-lived TLS Secret when its Redis dependency is enabled.
    caSecretName: ""
    caSecretKey: ca.crt

# Standard NetworkPolicy cannot express FQDN peers. Production operators must
# provide stable destination CIDRs (preferably an egress gateway) and ports.
# The Kubernetes API peer is API-only and environment/CNI-specific.
networkPolicy:
  kubernetesApi: []
  ingress:
    api:
      callers: []
      metricsScrapers: []
    worker:
      metricsScrapers: []
    console:
      callers: []
  api:
    external: []
  console:
    # Console performs server-side OIDC discovery, token exchange, and JWKS
    # retrieval. Production supplies only exact IdP/egress-gateway host CIDRs.
    external: []
    # Lead intake is separate from OIDC. Standard NetworkPolicy cannot express
    # FQDNs, so operators map the exact webhook and Redis hosts to stable /32 or
    # /128 egress-gateway addresses.
    demoWebhook: []
    demoRedis: []
  worker:
    external: []
  migrations:
    external: []

# Kubernetes is the production sandbox boundary. Production and staging must
# supply an immutable image reference and an existing RWX claim containing only
# repositories approved for checks. The chart creates a claim and fixture only
# in the isolated kind verification profile.
sandbox:
  backend: kubernetes
  # Precreate a namespace dedicated to sandbox RBAC, PVCs, policies, and Jobs.
  # It must differ from the Helm release/application namespace.
  namespace: ""
  # One Helm release/PVC is bound to one tenant. Deploy separate namespaces and
  # claims for additional tenants.
  tenantId: ""
  image:
    # Production/staging supply repository@sha256:<64 hex>. A tag is accepted
    # only by values-kind.yaml for an image built and loaded into that cluster.
    reference: ""
    pullPolicy: IfNotPresent
  commandTimeoutSeconds: 30
  pollIntervalSeconds: 0.25
  jobTtlSeconds: 60
  apiRequestTimeoutSeconds: 5
  # Additional post-DELETE convergence budget. The Kubernetes backend must use
  # it to prove that the exact Job and every Pod owned by its UID are absent.
  # Bounded 15..30 inclusive; defaults to 20.
  cleanupGraceSeconds: 20
  # Bounded allowance for scheduling and the verified PVC-to-emptyDir copy;
  # each command still has its own commandTimeoutSeconds budget.
  setupGraceSeconds: 15
  resources:
    cpu: "1"
    memoryMb: 512
    pidsLimit: 256
  workspace:
    mountPath: /workspace
    # Read-only view in the application namespace. In production this and
    # existingClaim must be operator-provisioned views of the same RWX backend.
    apiExistingClaim: ""
    # Read-write claim in sandbox.namespace, consumed only by fixture/sandbox Jobs.
    existingClaim: ""
    createClaim: false
    storage: 1Gi
    accessModes:
      - ReadWriteMany
  fixture:
    enabled: false
    repositoryName: smoke-repo

api:
  replicas: 1
  image:
    reference: ""
  service:
    port: 8000
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8000"
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

console:
  replicas: 1
  image:
    reference: ""
  # Runtime-only server configuration. The chart deliberately exposes no
  # NEXT_PUBLIC, unsigned-local, insecure-HTTP, or local-identity switches.
  publicOrigin: ""
  apiOrigin: ""
  oidc:
    issuer: ""
    clientId: ""
    apiAudience: ""
  service:
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

demoRequests:
  # Disabled is the deployable default until domain, legal approval, the CRM,
  # Redis TLS, and all file-backed credentials are supplied.
  enabled: false
  privacyContactEmail: ""
  webhookAllowedOrigin: ""
  redisCaPath: /run/hallu-defense/demo/redis-ca.pem

worker:
  enabled: true
  replicas: 1
  image:
    reference: ""
  command:
    - python
    - -m
    - hallu_defense.worker
    - --metrics-host
    - 0.0.0.0
    - --metrics-port
    - "9090"
  metricsPort: 9090
  # Bound the initial dependency/readiness grace period; the readiness command
  # still performs the authoritative PostgreSQL/OpenSearch checks.
  setupGraceSeconds: 10
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "9090"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

migrations:
  enabled: true
  expectedCount: 14
  # SHA-256 over the normalized UTF-8 SQL text recorded by the migration
  # applier. The chart gate derives this inventory from infra/rag/pgvector and
  # fails on any count, filename, or checksum drift.
  expectedChecksums:
    000_schema_migrations.sql: 1b95184e2da2027271f0faa7396e8e77d59c38f4f22779b1c1ba3ef8b288c9f7
    001_rag_evidence_chunks.sql: d83ab44c8292b637aeb50bddda4852734e661fd622c97cf280ef1910fdcd9665
    002_rag_corpus_grants.sql: 1f71be2ff06b0099bac08338b66ed727b2e2c76d61975e9ba37b3bcd95eaf957
    003_audit_ledger.sql: 622afd56f9005bbe6617dd70a773aaeaf274ba981dcac08b3386db24144c8a38
    004_approval_queue.sql: 5b9de7132204a849f84448407f1c34ec5b65dd3f4e2064a6e03d8dfeb234b2fc
    005_eval_reports.sql: 1174b785a36ec7ab20c3d7ea4a44b5ecbf8c72aa5eb26aeeebffedfe86c7008a
    006_ingestion_outbox.sql: 65c5261eef78ef85d87d3d4c0a0a53801215908bd6976d4d1b2315adffad3d22
    007_ingestion_lease_fencing.sql: 5444d0b3bacbc10aaa25f58af903a732545caccbe0f534bf1d4aed7e412e406f
    008_schema_migration_checksums.sql: bf79b45a1015f553f6f4516761d541bc1f4106c2f40bf52969e6c18fd951651f
    009_drop_unsafe_ivfflat.sql: aec207e341e290b9ce881d0cb29efc8c5ff87d62760e08f949b8afb6e1fa2ab7
    010_add_retrieved_at.sql: c3e1d88a7b6dd489beba1d22604e4b8244d214212be9992b3e8afe2aec4cf3b5
    011_rag_lifecycle_outbox.sql: c76a3072243cbc620bd7aad9785edc9e08e95a626b3f08645c223b2ff0bd1d84
    012_rag_tenant_deletion_fence.sql: 4e854001f82516e3b989f7fb9f8c8693e2c5ff40e38f443d1311ba9bf12083e8
    013_audit_history_integrity.sql: 53de950dd40706e81597cf219a25a6435dff3c2ba9bca1ff37a5cc6836c4d59e
  waitTimeoutSeconds: 600
  image:
    reference: ""
  command:
    - python
    - scripts/dev/apply_postgres_migrations.py

kindDependencies:
  enabled: false
  vault:
    enabled: true
    # Kind loads this locally rebuilt Go 1.26.5 derivative.
    image: hallu-defense-vault:ci
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi
  pgvector:
    enabled: true
    # Kind loads this locally built derivative. Production leaves all bundled
    # dependencies disabled and supplies managed PostgreSQL/pgvector.
    image: hallu-defense-pgvector:ci
    storage: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
  opensearch:
    enabled: true
    # Kind loads this locally built core-only derivative. Production leaves all
    # bundled dependencies disabled and supplies managed OpenSearch.
    image: hallu-defense-opensearch:ci
    storage: 2Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "1"
        memory: 2Gi
  redis:
    enabled: true
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    resources:
      server:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
      guard:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 100m
          memory: 64Mi

secrets:
  # Helm never accepts or renders secret values. Operators precreate these
  # Secrets; only names and non-sensitive key selectors enter release history.
  runtime:
    name: ""
    keycloakJwksKey: keycloak-jwks.json
    vaultTokenKey: vault-token
    postgresDsnKey: postgres-dsn
  bootstrap:
    name: ""
    vaultTokenKey: vault-token
  migrations:
    name: ""
    postgresDsnKey: migrations-postgres-dsn
  kindPostgres:
    name: ""
  kindVault:
    name: ""
  kindRedisTls:
    name: ""
  demo:
    name: ""
    webhookUrlKey: webhook-url
    webhookHmacSecretKey: webhook-hmac-secret
    redisUrlKey: redis-url
    redisCaKey: redis-ca.pem
    metricsBearerKey: metrics-bearer
