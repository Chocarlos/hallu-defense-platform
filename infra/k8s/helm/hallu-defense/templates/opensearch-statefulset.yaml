{{- if and .Values.kindDependencies.enabled .Values.kindDependencies.opensearch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hallu-defense.fullname" . }}-opensearch
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
spec:
  ports:
    - name: http
      port: 9200
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "hallu-defense.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: opensearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "hallu-defense.fullname" . }}-opensearch
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
    app.kubernetes.io/component: opensearch
spec:
  serviceName: {{ include "hallu-defense.fullname" . }}-opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hallu-defense.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: opensearch
  template:
    metadata:
      labels:
        {{- include "hallu-defense.labels" . | nindent 8 }}
        app.kubernetes.io/component: opensearch
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: opensearch
          image: {{ .Values.kindDependencies.opensearch.image | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: 9200
          env:
            - name: discovery.type
              value: single-node
            - name: plugins.security.disabled
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "hallu-defense.fullname" . }}-opensearch
                  key: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            {{- toYaml .Values.kindDependencies.opensearch.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.kindDependencies.opensearch.storage }}
{{- end }}
