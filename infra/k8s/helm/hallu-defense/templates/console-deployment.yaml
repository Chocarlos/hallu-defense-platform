{{- $portPattern := "([1-9][0-9]{0,3}|[1-5][0-9]{4}|6[0-4][0-9]{3}|65[0-4][0-9]{2}|655[0-2][0-9]|6553[0-5])" -}}
{{- $originPattern := printf "^https://(([a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?\\.)*[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)(:%s)?$" $portPattern -}}
{{- $issuerPattern := printf "^https://(([a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?\\.)*[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)(:%s)?(/[A-Za-z0-9._~-]+)+$" $portPattern -}}
{{- $identifierPattern := "^[A-Za-z0-9][A-Za-z0-9._:-]{0,127}$" -}}
{{- $publicOrigin := required "console.publicOrigin is required" .Values.console.publicOrigin -}}
{{- $apiOrigin := required "console.apiOrigin is required" .Values.console.apiOrigin -}}
{{- $issuer := required "console.oidc.issuer is required" .Values.console.oidc.issuer -}}
{{- $clientId := required "console.oidc.clientId is required" .Values.console.oidc.clientId -}}
{{- $apiAudience := required "console.oidc.apiAudience is required" .Values.console.oidc.apiAudience -}}
{{- if ne (int .Values.console.replicas) 1 -}}
{{- fail "console.replicas must equal 1 until OIDC session and transaction state use a shared store" -}}
{{- end -}}
{{- if not (regexMatch $originPattern $publicOrigin) -}}
{{- fail "console.publicOrigin must be an exact canonical HTTPS origin without credentials, path, query, fragment, or trailing slash" -}}
{{- end -}}
{{- if not (regexMatch $originPattern $apiOrigin) -}}
{{- fail "console.apiOrigin must be an exact canonical HTTPS origin without credentials, path, query, fragment, or trailing slash" -}}
{{- end -}}
{{- if not (regexMatch $issuerPattern $issuer) -}}
{{- fail "console.oidc.issuer must be an exact canonical HTTPS realm URL without credentials, query, fragment, percent encoding, or trailing slash" -}}
{{- end -}}
{{- if not (regexMatch $identifierPattern $clientId) -}}
{{- fail "console.oidc.clientId must be a canonical public OIDC client identifier" -}}
{{- end -}}
{{- if not (regexMatch $identifierPattern $apiAudience) -}}
{{- fail "console.oidc.apiAudience must be a canonical API audience identifier" -}}
{{- end -}}
{{- if not (has $publicOrigin .Values.cors.allowOrigins) -}}
{{- fail "console.publicOrigin must appear exactly in cors.allowOrigins" -}}
{{- end -}}
{{- if ne $issuer .Values.oidc.issuer -}}
{{- fail "console.oidc.issuer must exactly match oidc.issuer" -}}
{{- end -}}
{{- if ne $apiAudience .Values.oidc.audience -}}
{{- fail "console.oidc.apiAudience must exactly match oidc.audience" -}}
{{- end -}}
{{- if .Values.demoRequests.enabled -}}
{{- $privacyContact := required "demoRequests.privacyContactEmail is required when intake is enabled" .Values.demoRequests.privacyContactEmail -}}
{{- if or (gt (len $privacyContact) 254) (not (regexMatch "^[^[:space:]@]+@[^[:space:]@]+\\.[^[:space:]@]+$" $privacyContact)) -}}
{{- fail "demoRequests.privacyContactEmail must be a valid email address of at most 254 characters" -}}
{{- end -}}
{{- $webhookOrigin := required "demoRequests.webhookAllowedOrigin is required when intake is enabled" .Values.demoRequests.webhookAllowedOrigin -}}
{{- if not (regexMatch $originPattern $webhookOrigin) -}}
{{- fail "demoRequests.webhookAllowedOrigin must be an exact canonical HTTPS origin" -}}
{{- end -}}
{{- $demoKeys := list .Values.secrets.demo.webhookUrlKey .Values.secrets.demo.webhookHmacSecretKey .Values.secrets.demo.redisUrlKey .Values.secrets.demo.redisCaKey .Values.secrets.demo.metricsBearerKey -}}
{{- if ne (len $demoKeys) (len (uniq $demoKeys)) -}}
{{- fail "secrets.demo data keys must be distinct" -}}
{{- end -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hallu-defense.fullname" . }}-console
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  replicas: {{ .Values.console.replicas }}
  # OIDC transaction/session state and demo runtime configuration are
  # process-local. Recreate prevents old and new Console revisions from serving
  # concurrently with different cached state or secret-file inodes.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hallu-defense.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: console
  template:
    metadata:
      labels:
        {{- include "hallu-defense.labels" . | nindent 8 }}
        app.kubernetes.io/component: console
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "hallu-defense.podSecurityContext" . | nindent 8 }}
      containers:
        - name: console
          image: {{ include "hallu-defense.consoleImage" . | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "hallu-defense.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: HALLU_DEFENSE_ENV
              value: production
            - name: HALLU_DEFENSE_DEMO_REQUESTS_ENABLED
              value: {{ .Values.demoRequests.enabled | quote }}
            {{- if .Values.demoRequests.privacyContactEmail }}
            - name: HALLU_DEFENSE_PRIVACY_CONTACT_EMAIL
              value: {{ .Values.demoRequests.privacyContactEmail | quote }}
            {{- end }}
            {{- if .Values.demoRequests.enabled }}
            - name: HALLU_DEFENSE_DEMO_WEBHOOK_URL_FILE
              value: /run/hallu-defense/demo/webhook-url
            - name: HALLU_DEFENSE_DEMO_WEBHOOK_HMAC_SECRET_FILE
              value: /run/hallu-defense/demo/webhook-hmac-secret
            - name: HALLU_DEFENSE_DEMO_WEBHOOK_ALLOWED_ORIGIN
              value: {{ .Values.demoRequests.webhookAllowedOrigin | quote }}
            - name: HALLU_DEFENSE_DEMO_REDIS_URL_FILE
              value: /run/hallu-defense/demo/redis-url
            - name: HALLU_DEFENSE_DEMO_REDIS_CA_PATH
              value: {{ .Values.demoRequests.redisCaPath | quote }}
            - name: HALLU_DEFENSE_CONSOLE_METRICS_BEARER_FILE
              value: /run/hallu-defense/demo/metrics-bearer
            {{- end }}
            - name: HALLU_DEFENSE_CONSOLE_AUTH_MODE
              value: oidc
            - name: HALLU_DEFENSE_CONSOLE_PUBLIC_ORIGIN
              value: {{ $publicOrigin | quote }}
            - name: HALLU_DEFENSE_CONSOLE_API_ORIGIN
              value: {{ $apiOrigin | quote }}
            - name: HALLU_DEFENSE_CONSOLE_OIDC_ISSUER
              value: {{ $issuer | quote }}
            - name: HALLU_DEFENSE_CONSOLE_OIDC_CLIENT_ID
              value: {{ $clientId | quote }}
            - name: HALLU_DEFENSE_CONSOLE_OIDC_API_AUDIENCE
              value: {{ $apiAudience | quote }}
            - name: HALLU_DEFENSE_CONSOLE_OIDC_TENANT_CLAIM
              value: tenant_id
            - name: HALLU_DEFENSE_CONSOLE_OIDC_ROLES_CLAIM
              value: roles
            - name: HALLU_DEFENSE_CONSOLE_OIDC_REQUIRED_ROLES
              value: verifier,approval_reviewer,policy_evaluator,sandbox_runner,tool_operator
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.demoRequests.enabled }}
            - name: demo-secrets
              mountPath: /run/hallu-defense/demo
              readOnly: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: /console
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /console
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.console.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: {{ .Values.global.tmpSizeLimit | quote }}
        {{- if .Values.demoRequests.enabled }}
        - name: demo-secrets
          secret:
            secretName: {{ .Values.secrets.demo.name | quote }}
            defaultMode: 0440
            items:
              - key: {{ .Values.secrets.demo.webhookUrlKey | quote }}
                path: webhook-url
              - key: {{ .Values.secrets.demo.webhookHmacSecretKey | quote }}
                path: webhook-hmac-secret
              - key: {{ .Values.secrets.demo.redisUrlKey | quote }}
                path: redis-url
              - key: {{ .Values.secrets.demo.redisCaKey | quote }}
                path: redis-ca.pem
              - key: {{ .Values.secrets.demo.metricsBearerKey | quote }}
                path: metrics-bearer
        {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hallu-defense.fullname" . }}-console
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.console.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "hallu-defense.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: console
