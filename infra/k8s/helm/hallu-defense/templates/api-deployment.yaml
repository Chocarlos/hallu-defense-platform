apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hallu-defense.fullname" . }}-api
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "hallu-defense.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: api
  template:
    metadata:
      annotations:
        # prometheus.io/scrape annotations are supplied from .Values.api.podAnnotations.
        {{- toYaml .Values.api.podAnnotations | nindent 8 }}
      labels:
        {{- include "hallu-defense.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      securityContext:
        {{- include "hallu-defense.podSecurityContext" . | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            {{- include "hallu-defense.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8000
          env:
            {{- include "hallu-defense.apiEnv" . | nindent 12 }}
          volumeMounts:
            - name: keycloak-jwks
              mountPath: {{ .Values.oidc.jwksPath | quote }}
              subPath: keycloak-jwks.json
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: workspace
              mountPath: /workspace
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      volumes:
        - name: keycloak-jwks
          secret:
            secretName: {{ include "hallu-defense.fullname" . }}-runtime
            items:
              - key: keycloak-jwks.json
                path: keycloak-jwks.json
        - name: tmp
          emptyDir: {}
        - name: workspace
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "hallu-defense.fullname" . }}-api
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/name: {{ include "hallu-defense.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: api
