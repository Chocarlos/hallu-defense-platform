apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hallu-defense.fullname" . }}-runtime
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
type: Opaque
stringData:
  keycloak-jwks.json: {{ required "secrets.keycloakJwks is required" .Values.secrets.keycloakJwks | quote }}
  vault-token: {{ required "secrets.vaultToken is required" .Values.secrets.vaultToken | quote }}
  postgres-dsn: {{ required "secrets.postgresDsn is required" .Values.secrets.postgresDsn | quote }}
  metrics-bearer-token: {{ required "secrets.metricsBearerToken is required" .Values.secrets.metricsBearerToken | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hallu-defense.fullname" . }}-postgres
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_USER: {{ required "secrets.postgresUser is required" .Values.secrets.postgresUser | quote }}
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required" .Values.secrets.postgresPassword | quote }}
  POSTGRES_DB: {{ required "secrets.postgresDatabase is required" .Values.secrets.postgresDatabase | quote }}
{{- if and .Values.kindDependencies.enabled .Values.kindDependencies.opensearch.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "hallu-defense.fullname" . }}-opensearch
  labels:
    {{- include "hallu-defense.labels" . | nindent 4 }}
type: Opaque
stringData:
  OPENSEARCH_INITIAL_ADMIN_PASSWORD: {{ required "secrets.opensearchInitialAdminPassword is required" .Values.secrets.opensearchInitialAdminPassword | quote }}
{{- end }}
