{{- /*
Helm intentionally renders no Secret objects. Operators precreate every Secret;
only validated object names and key selectors are stored in release history.
*/ -}}
{{- $runtimeSecretName := required "secrets.runtime.name is required; precreate the runtime Secret" .Values.secrets.runtime.name -}}
{{- $bootstrapSecretName := required "secrets.bootstrap.name is required; precreate the bootstrap Secret" .Values.secrets.bootstrap.name -}}
{{- $allSecretNames := list (dict "field" "secrets.runtime.name" "value" $runtimeSecretName) (dict "field" "secrets.bootstrap.name" "value" $bootstrapSecretName) -}}
{{- if .Values.migrations.enabled -}}
{{- $migrationsSecretName := required "secrets.migrations.name is required when migrations.enabled=true; precreate the migration Secret" .Values.secrets.migrations.name -}}
{{- $allSecretNames = append $allSecretNames (dict "field" "secrets.migrations.name" "value" $migrationsSecretName) -}}
{{- end -}}
{{- if and .Values.kindDependencies.enabled .Values.kindDependencies.pgvector.enabled -}}
{{- $name := required "secrets.kindPostgres.name is required for the kind pgvector fixture" .Values.secrets.kindPostgres.name -}}
{{- $allSecretNames = append $allSecretNames (dict "field" "secrets.kindPostgres.name" "value" $name) -}}
{{- end -}}
{{- if and .Values.kindDependencies.enabled .Values.kindDependencies.vault.enabled -}}
{{- $name := required "secrets.kindVault.name is required for the kind Vault fixture" .Values.secrets.kindVault.name -}}
{{- $allSecretNames = append $allSecretNames (dict "field" "secrets.kindVault.name" "value" $name) -}}
{{- end -}}
{{- if and .Values.kindDependencies.enabled .Values.kindDependencies.redis.enabled -}}
{{- $name := required "secrets.kindRedisTls.name is required for the kind Redis fixture" .Values.secrets.kindRedisTls.name -}}
{{- $allSecretNames = append $allSecretNames (dict "field" "secrets.kindRedisTls.name" "value" $name) -}}
{{- end -}}
{{- $seenNames := dict -}}
{{- range $secret := $allSecretNames -}}
{{- $field := $secret.field -}}
{{- $name := $secret.value -}}
{{- if gt (len $name) 253 -}}
{{- fail (printf "%s must be at most 253 characters" $field) -}}
{{- end -}}
{{- range $label := splitList "." $name -}}
{{- if or (gt (len $label) 63) (not (regexMatch "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$" $label)) -}}
{{- fail (printf "%s must be a valid Kubernetes DNS subdomain" $field) -}}
{{- end -}}
{{- end -}}
{{- if hasKey $seenNames $name -}}
{{- fail (printf "%s must reference a distinct precreated Secret" $field) -}}
{{- end -}}
{{- $_ := set $seenNames $name true -}}
{{- end -}}
{{- $secretKeys := list
      (dict "field" "secrets.runtime.keycloakJwksKey" "value" .Values.secrets.runtime.keycloakJwksKey)
      (dict "field" "secrets.runtime.vaultTokenKey" "value" .Values.secrets.runtime.vaultTokenKey)
      (dict "field" "secrets.runtime.postgresDsnKey" "value" .Values.secrets.runtime.postgresDsnKey)
      (dict "field" "secrets.bootstrap.vaultTokenKey" "value" .Values.secrets.bootstrap.vaultTokenKey) -}}
{{- if .Values.migrations.enabled -}}
{{- $secretKeys = append $secretKeys (dict "field" "secrets.migrations.postgresDsnKey" "value" .Values.secrets.migrations.postgresDsnKey) -}}
{{- end -}}
{{- range $selector := $secretKeys -}}
{{- $key := required (printf "%s is required" $selector.field) $selector.value -}}
{{- if or (gt (len $key) 253) (not (regexMatch "^[A-Za-z0-9._-]+$" $key)) -}}
{{- fail (printf "%s must be a valid Kubernetes Secret data key" $selector.field) -}}
{{- end -}}
{{- end -}}
