global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/demo-request-alerts.yml

scrape_configs:
  - job_name: hallu-defense-api
    metrics_path: /metrics
    scheme: https
    authorization:
      type: Bearer
      credentials_file: /run/secrets/hallu_defense_metrics_bearer_token
    static_configs:
      - targets:
          - api:8000
  - job_name: hallu-defense-console
    metrics_path: /metrics
    scheme: http
    authorization:
      type: Bearer
      credentials_file: /run/secrets/hallu_console_metrics_bearer
    static_configs:
      - targets:
          - console:3000
